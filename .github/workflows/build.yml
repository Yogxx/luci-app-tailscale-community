name: Build luci-app-tailscale-community

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "root/**"
      - "htdocs/**"
      - "po/**"
      - "Makefile"
      - ".github/workflows/build.yml"

permissions:
  contents: read

jobs:
  build:
    name: OpenWrt ${{ matrix.version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "24.10.7"
            format: "ipk"
            sdk: "https://downloads.openwrt.org/releases/24.10.7/targets/x86/64/openwrt-sdk-24.10.7-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"

          - version: "25.12.5"
            format: "apk"
            sdk: "https://downloads.openwrt.org/releases/25.12.5/targets/x86/64/openwrt-sdk-25.12.5-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            gawk \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3 \
            rsync \
            unzip \
            wget \
            zstd \
            file

      - name: Download SDK
        run: |
          wget -q "${{ matrix.sdk }}" -O sdk.tar.zst

          mkdir sdk

          tar \
            --use-compress-program=unzstd \
            -xf sdk.tar.zst \
            -C sdk \
            --strip-components=1

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: |
            sdk/dl
            sdk/staging_dir
            sdk/build_dir
          key: sdk-${{ matrix.version }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            sdk-${{ matrix.version }}-

      - name: Update feeds
        working-directory: sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add package
        run: |
          mkdir -p sdk/package/luci-app-tailscale-community

          cp -a . sdk/package/luci-app-tailscale-community

          rm -rf sdk/package/luci-app-tailscale-community/.git
          rm -rf sdk/package/luci-app-tailscale-community/.github

      - name: Build
        working-directory: sdk
        run: |
          make defconfig

          make package/luci-app-tailscale-community/clean

          make package/luci-app-tailscale-community/compile \
            V=sc \
            -j$(nproc)

      - name: Show packages
        run: |
          find sdk/bin/packages -type f

      - name: Collect package
        run: |
          mkdir artifacts

          find sdk/bin/packages \
            -type f \
            \( \
              -name "*.ipk" \
              -o \
              -name "*.apk" \
            \) \
            -exec cp {} artifacts/ \;

          ls -lh artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-tailscale-community-${{ matrix.version }}
          path: artifacts/*
          if-no-files-found: error
